<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAT DROP</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:20px;
font-weight:bold;
}

.menu-btn{
font-size:24px;
cursor:pointer;
}

.side-menu{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
z-index:2000;
}

.side-menu.active{
left:0;
}

.side-menu h3{
margin-top:0;
}

.side-menu button{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:white;
border:none;
cursor:pointer;
}

.hero{
text-align:center;
padding:40px 20px;
}

.live-bar{
background:#1a1a1a;
padding:8px;
font-size:14px;
text-align:center;
color:#0f0;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:8px;
text-align:center;
}

.card img{
width:100%;
border-radius:6px;
}

.card button{
margin-top:5px;
padding:8px;
border:none;
cursor:pointer;
}

.cart-panel{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#111;
padding:15px;
transition:0.3s;
z-index:2000;
overflow-y:auto;
}

.cart-panel.active{
right:0;
}

.cart-item{
border-bottom:1px solid #333;
padding:8px 0;
}

.checkout-btn{
background:#25D366;
color:white;
padding:10px;
width:100%;
border:none;
cursor:pointer;
margin-top:10px;
}

/* LOGIN */
#loginScreen{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
background:#111;
padding:25px;
border-radius:8px;
width:90%;
max-width:400px;
}

.login-box input{
width:100%;
padding:10px;
margin:6px 0;
background:#222;
border:none;
color:white;
}

.login-box button{
width:100%;
padding:10px;
background:#25D366;
border:none;
color:white;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="login-box">
<h2>Bienvenido a HAT DROP</h2>
<input type="text" id="nombre" placeholder="Nombre completo" required>
<input type="text" id="usuario" placeholder="Usuario" required>
<input type="email" id="correo" placeholder="Correo" required>
<input type="tel" id="telefono" placeholder="Teléfono" required>
<label><input type="checkbox" id="terminos"> Acepto términos y condiciones</label>
<button onclick="entrar()">Entrar</button>
</div>
</div>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="logo">HAT DROP</div>
<div onclick="toggleCart()">🛒</div>
</header>

<div class="side-menu" id="sideMenu">
<h3>Menú</h3>
<button onclick="toggleCart()">Ver carrito</button>
<button onclick="alert('Wishlist próximamente')">Lista de deseos</button>
</div>

<div class="hero">
<h1>Las mejores gorras</h1>
</div>

<div class="live-bar" id="liveBar">
🔥 Bienvenido a HAT DROP
</div>

<div class="products" id="products"></div>

<div class="cart-panel" id="cartPanel">
<h3>Carrito</h3>
<div id="cartItems"></div>
<input type="text" id="cupon" placeholder="Cupón">
<button onclick="aplicarCupon()">Aplicar cupón</button>
<h4>Total: $<span id="total">0</span></h4>
<button class="checkout-btn" onclick="enviarPedido()">Enviar pedido</button>
</div>

<script>
let productos = [
{id:1,nombre:"Chrome Hearts",precio:749,img:"chrome.jpg",stock:5},
{id:2,nombre:"Maga Hat",precio:699,img:"mago.jpg",stock:4}
];

let carrito=[];
let descuento=0;

function entrar(){
if(
nombre.value &&
usuario.value &&
correo.value &&
telefono.value &&
terminos.checked
){
loginScreen.style.display="none";
}else{
alert("Completa todos los campos");
}
}

function toggleMenu(){
sideMenu.classList.toggle("active");
}

function toggleCart(){
cartPanel.classList.toggle("active");
}

function renderProductos(){
products.innerHTML="";
productos.forEach(p=>{
products.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.nombre}</h4>
<p>$${p.precio}</p>
<p>Stock: ${p.stock}</p>
<button onclick="agregar(${p.id})">Agregar</button>
</div>
`;
});
}

function agregar(id){
let producto=productos.find(p=>p.id===id);
if(producto.stock>0){
carrito.push(producto);
producto.stock--;
renderProductos();
renderCarrito();
}
}

function renderCarrito(){
cartItems.innerHTML="";
let total=0;
carrito.forEach((p,i)=>{
total+=p.precio;
cartItems.innerHTML+=`
<div class="cart-item">
${p.nombre} - $${p.precio}
</div>
`;
});
total=total-descuento;
document.getElementById("total").innerText=total;
}

function aplicarCupon(){
if(cupon.value==="HAT10"){
descuento=100;
renderCarrito();
alert("Cupón aplicado");
}
}

function enviarPedido(){
let total=document.getElementById("total").innerText;
let mensaje=`Hola quiero ordenar:\n`;
carrito.forEach(p=>{
mensaje+=`- ${p.nombre}\n`;
});
mensaje+=`\nTotal: $${total}\n\nCliente:\n${nombre.value}\n${telefono.value}`;
let url=`https://wa.me/5215531622061?text=${encodeURIComponent(mensaje)}`;
window.open(url,"_blank");

liveBar.innerText=`🔥 ${nombre.value} ordenó ${carrito.length} productos`;
}

renderProductos();
</script>

</body>
</html>
