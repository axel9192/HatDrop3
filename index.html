<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hat Drop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#ffffff;
color:#111;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
position:fixed;
width:100%;
top:0;
background:white;
border-bottom:1px solid #eee;
z-index:1000;
}

.logo{
font-weight:700;
font-size:22px;
cursor:pointer;
}

.icon{
cursor:pointer;
font-size:20px;
}

.section{
padding:120px 40px 60px 40px;
}

.hero{
text-align:center;
padding-top:150px;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
color:#555;
margin-bottom:25px;
}

.btn{
background:black;
color:white;
padding:12px 20px;
border:none;
cursor:pointer;
font-weight:600;
}

.carousel{
display:flex;
overflow-x:auto;
gap:20px;
padding-bottom:20px;
}

.card{
min-width:220px;
border:1px solid #eee;
padding:15px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card img{
width:100%;
}

.price{
font-weight:600;
}

.old{
text-decoration:line-through;
color:gray;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.hidden{
display:none;
}

input{
padding:10px;
width:100%;
margin-bottom:10px;
border:1px solid #ddd;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

@media(max-width:768px){
.hero h1{font-size:28px;}
.section{padding:100px 20px 40px 20px;}
}

</style>
</head>
<body>

<header>
<div class="icon" onclick="openLogin()">👤</div>
<div class="logo" onclick="showHome()">HAT DROP</div>
<div class="icon" onclick="showCart()">🛒 (<span id="cartCount">0</span>)</div>
</header>

<!-- HOME -->
<div id="home">

<div class="hero">
<h1>Gorras que hablan por ti.</h1>
<p>Diseño premium. Ediciones limitadas.</p>
<button class="btn" onclick="scrollToCatalog()">Ver colección</button>
</div>

<div class="section">
<h2>Destacado</h2>
<div class="carousel" id="featured"></div>
</div>

<div class="section">
<h2>Lo más nuevo</h2>
<div class="carousel" id="newest"></div>
</div>

<div class="section" id="catalogSection">
<h2>Catálogo completo</h2>
<div class="grid" id="catalog"></div>
</div>

</div>

<!-- PRODUCT VIEW -->
<div id="productView" class="hidden section"></div>

<!-- CART -->
<div id="cartView" class="hidden section"></div>

<!-- CHECKOUT -->
<div id="checkoutView" class="hidden section"></div>

<!-- LOGIN -->
<div id="loginView" class="hidden section"></div>

<script>

const phone="525531622061";

let products=[
{id:1,name:"Chrome x CT",price:799,old:899,images:["images/chrome1.jpg","images/chrome2.jpg"],desc:"Edición premium Chrome x CT.",featured:true,new:false},
{id:2,name:"Black Classic",price:799,old:null,images:["images/black1.jpg","images/black2.jpg"],desc:"Diseño negro minimalista.",featured:true,new:true},
{id:3,name:"White Signature",price:850,old:950,images:["images/white1.jpg","images/white2.jpg"],desc:"Estilo limpio y elegante.",featured:false,new:true},
{id:4,name:"Red Limited",price:820,old:null,images:["images/red1.jpg","images/red2.jpg"],desc:"Edición limitada roja.",featured:true,new:false},
{id:5,name:"Beige Essential",price:780,old:null,images:["images/beige1.jpg","images/beige2.jpg"],desc:"Beige minimal premium.",featured:false,new:true},
{id:6,name:"Navy Elite",price:830,old:920,images:["images/navy1.jpg","images/navy2.jpg"],desc:"Azul marino elegante.",featured:false,new:false}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function updateCartCount(){
document.getElementById("cartCount").innerText=cart.length;
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
}

function renderProducts(){
let featured=document.getElementById("featured");
let newest=document.getElementById("newest");
let catalog=document.getElementById("catalog");

featured.innerHTML="";
newest.innerHTML="";
catalog.innerHTML="";

products.forEach(p=>{
let card=createCard(p);
catalog.appendChild(card.cloneNode(true));
if(p.featured)featured.appendChild(card.cloneNode(true));
if(p.new)newest.appendChild(card.cloneNode(true));
});
}

function createCard(p){
let div=document.createElement("div");
div.className="card";
div.onclick=()=>openProduct(p.id);
div.innerHTML=`
<img src="${p.images[0]}">
<h4>${p.name}</h4>
${p.old?`<div class="old">$${p.old}</div>`:""}
<div class="price">$${p.price}</div>
`;
return div;
}

function openProduct(id){
let p=products.find(x=>x.id===id);
hideAll();
let view=document.getElementById("productView");
view.innerHTML=`
<h2>${p.name}</h2>
<img src="${p.images[0]}" style="width:300px;">
<p>${p.desc}</p>
<h3>$${p.price}</h3>
<button class="btn" onclick="addToCart(${p.id})">Agregar al carrito</button>
`;
view.classList.remove("hidden");
}

function addToCart(id){
let p=products.find(x=>x.id===id);
cart.push(p);
saveCart();
alert("Agregado al carrito");
}

function showCart(){
hideAll();
let view=document.getElementById("cartView");
let html="<h2>Carrito</h2>";
let total=0;

cart.forEach((p,i)=>{
total+=p.price;
html+=`<div class="cart-item">
<span>${p.name}</span>
<span>$${p.price}</span>
</div>`;
});

let shipping=total>=1500?0:120;
let final=total+shipping;

html+=`<hr>
<p>Subtotal: $${total}</p>
<p>Envío: $${shipping}</p>
<h3>Total: $${final}</h3>
<button class="btn" onclick="showCheckout()">Proceder al pago</button>
`;

view.innerHTML=html;
view.classList.remove("hidden");
}

function showCheckout(){
hideAll();
let view=document.getElementById("checkoutView");
view.innerHTML=`
<h2>Checkout</h2>
<input id="name" placeholder="Nombre completo">
<input id="phoneInput" placeholder="Teléfono">
<input id="address" placeholder="Dirección">
<button class="btn" onclick="sendOrder()">Confirmar por WhatsApp</button>
`;
view.classList.remove("hidden");
}

function sendOrder(){
let name=document.getElementById("name").value;
let total=cart.reduce((s,p)=>s+p.price,0);
let shipping=total>=1500?0:120;
let final=total+shipping;

let msg=`🧢 *Nuevo pedido - Hat Drop*%0A%0A👤 Cliente: ${name}%0A%0A📦 Productos:%0A`;

cart.forEach((p,i)=>{
msg+=`${i+1}. ${p.name} - $${p.price}%0A`;
});

msg+=`%0A💰 Total: $${final} MXN%0A📍 Envío: ${shipping===0?"GRATIS":"$"+shipping}`;

window.open(`https://wa.me/${phone}?text=${msg}`);
}

function hideAll(){
document.getElementById("home").classList.add("hidden");
document.getElementById("productView").classList.add("hidden");
document.getElementById("cartView").classList.add("hidden");
document.getElementById("checkoutView").classList.add("hidden");
document.getElementById("loginView").classList.add("hidden");
}

function showHome(){
hideAll();
document.getElementById("home").classList.remove("hidden");
}

function scrollToCatalog(){
document.getElementById("catalogSection").scrollIntoView({behavior:"smooth"});
}

renderProducts();
updateCartCount();

</script>

</body>
</html>
